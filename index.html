<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Mouse Race To The Cheese</title>
    <meta
      name="description"
      content="A playful 3D maze race where a brave mouse beats Alice to a giant wedge of parmesan."
    />
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <div id="game-shell">
        <div id="game-container"></div>
        <div id="hud" class="hidden">
          <div class="hud-left">
            <div id="hud-status" class="hud-pill"></div>
          </div>
          <div class="hud-center">
            <div id="timer-track" aria-label="Alice timer: Alice reaches the cheese when time runs out">
              <div id="timer-fill"></div>
              <img id="timer-alice" src="/src/Images/file_00000000e9d0720b907b128f233c1f66.png" alt="Alice" />
              <img id="timer-cheese" src="/src/Images/cheese_circular_crop.png" alt="Cheese" />
            </div>
          </div>
          <div class="hud-right">
            <button id="scout-btn" class="hud-button" type="button" aria-label="Use scout view">🔭1</button>
            <button id="mute-btn" class="hud-button" type="button" aria-label="Toggle sound">🔊</button>
            <button id="fullscreen-btn" class="hud-button" type="button" aria-label="Toggle fullscreen">⛶</button>
          </div>
          <div id="hud-toast" class="hud-toast hidden"></div>
          <div id="scout-map-overlay" class="scout-map-overlay hidden" aria-hidden="true"></div>
          <div id="vignette" class="vignette"></div>
        </div>
        <div id="start-screen" class="screen">
          <div class="screen-card hero-card">
            <div class="hero-badge">3D Maze Race</div>
            <h1>Mouse Race To The Cheese</h1>
            <div class="picker-section">
              <div class="picker-label">Choose Maze</div>
              <div class="maze-picker" aria-label="Maze selection">
                <button class="maze-btn active" type="button" data-maze="0" aria-pressed="true">
                  <span class="maze-icon">📦</span>
                  <strong>Cardboard</strong>
                  <span>Cheese Run</span>
                </button>
                <button class="maze-btn" type="button" data-maze="1" aria-pressed="false">
                  <span class="maze-icon">🪨</span>
                  <strong>Ancient</strong>
                  <span>Catacombs</span>
                </button>
                <button class="maze-btn" type="button" data-maze="2" aria-pressed="false">
                  <span class="maze-icon">🌿</span>
                  <strong>Jungle</strong>
                  <span>Ruins</span>
                </button>
              </div>
            </div>
            <div class="picker-section">
              <div class="picker-label">Difficulty</div>
              <div class="difficulty-picker" aria-label="Difficulty level">
                <button class="difficulty-btn active" type="button" data-difficulty="easy" aria-pressed="true">
                  <strong>Kid</strong>
                  <span>1 key · no life lost on bumps</span>
                </button>
                <button class="difficulty-btn" type="button" data-difficulty="medium" aria-pressed="false">
                  <strong>Medium</strong>
                  <span>2 keys · gentler chase</span>
                </button>
                <button class="difficulty-btn" type="button" data-difficulty="hard" aria-pressed="false">
                  <strong>Hard</strong>
                  <span>All keys · full challenge</span>
                </button>
              </div>
            </div>
            <details class="hero-controls">
              <summary>Controls &amp; Tips</summary>
              <div class="hero-notes">
                <span><kbd>W</kbd><kbd>S</kbd><kbd>↑</kbd><kbd>↓</kbd> Move</span>
                <span><kbd>A</kbd><kbd>D</kbd><kbd>←</kbd><kbd>→</kbd> Turn</span>
                <span><kbd>M</kbd> or 🔭 Scout view</span>
                <span>Touch: hold the movement pads</span>
                <span>Crumbs → extra lives</span>
                <span>Green crumbs show the path</span>
                <span>Gems teleport in pairs</span>
              </div>
            </details>
            <button id="start-btn" class="primary-btn" type="button">Start Race</button>
          </div>
        </div>
        <div id="overlay" class="screen hidden">
          <div class="screen-card">
            <h2 id="overlay-title"></h2>
            <p id="overlay-body"></p>
            <button id="overlay-btn" class="primary-btn" type="button">Continue</button>
          </div>
        </div>
        <div id="touch-controls" aria-label="Touch movement controls">
          <div class="touch-pad touch-pad-steer" aria-label="Steering controls">
            <div class="touch-pad-label">Steer</div>
            <div class="touch-row separated">
              <button id="touch-left" class="touch-btn arrow" type="button" aria-label="Turn left">◀</button>
              <button id="touch-right" class="touch-btn arrow" type="button" aria-label="Turn right">▶</button>
            </div>
          </div>
          <div class="touch-pad touch-pad-drive" aria-label="Forward and reverse controls">
            <div class="touch-pad-label">Move</div>
            <button id="touch-up" class="touch-btn arrow touch-btn-primary" type="button" aria-label="Move forward">▲</button>
            <button id="touch-down" class="touch-btn arrow" type="button" aria-label="Move backward">▼</button>
          </div>
        </div>
        <aside id="playtest-panel" class="hidden">
          <div class="playtest-title">Playtest</div>
          <div class="playtest-group">
            <button id="ptest-start" class="playtest-btn" type="button">Start</button>
            <button id="ptest-continue" class="playtest-btn" type="button">Continue</button>
            <button id="ptest-reset" class="playtest-btn" type="button">Reset</button>
          </div>
          <div class="playtest-group">
            <button id="ptest-up" class="playtest-btn" type="button">Step Up</button>
            <button id="ptest-left" class="playtest-btn" type="button">Step Left</button>
            <button id="ptest-down" class="playtest-btn" type="button">Step Down</button>
            <button id="ptest-right" class="playtest-btn" type="button">Step Right</button>
          </div>
          <div class="playtest-group">
            <button id="ptest-crumb" class="playtest-btn" type="button">Warp Crumb</button>
            <button id="ptest-green-crumb" class="playtest-btn" type="button">Warp Green Crumb</button>
            <button id="ptest-gem" class="playtest-btn" type="button">Warp Gem</button>
            <button id="ptest-trap" class="playtest-btn" type="button">Warp Trap</button>
            <button id="ptest-cheese" class="playtest-btn" type="button">Warp Cheese</button>
          </div>
          <div class="playtest-group">
            <button id="ptest-cat" class="playtest-btn" type="button">Warp Cat</button>
            <button id="ptest-alice" class="playtest-btn" type="button">Alice 95%</button>
            <button id="ptest-hit" class="playtest-btn" type="button">Lose Life</button>
          </div>
          <pre id="playtest-state"></pre>
        </aside>
      </div>
    </div>
  </body>
</html>
